<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>PrometheusHUB</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script>
    (function () {
      var current = (window.__API_BASE_URL__ || '').trim();
      var host = (window.location && window.location.hostname || '').toLowerCase();
      var isAdmin = host.startsWith('admin.');
      var fallback = isAdmin
        ? 'https://api.marketplaceonline.site/api/v1'
        : 'https://api.marketplaceonline.site/api/v1';

      if (!current || current.indexOf('__API_BASE_URL__') >= 0) {
        window.__API_BASE_URL__ = fallback;
      }

      // Apply theme immediately to avoid black flash before Angular loads
      var persistedTheme = null;
      try { persistedTheme = localStorage.getItem('phub.ui.theme.v1'); } catch(e) {}
      var theme = (persistedTheme === 'dark' || persistedTheme === 'light') ? persistedTheme : 'light';
      document.documentElement.setAttribute('data-theme', theme);
      document.documentElement.style.colorScheme = theme;
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>

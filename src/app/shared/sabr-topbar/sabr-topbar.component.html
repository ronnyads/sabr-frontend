<header class="sabr-topbar" [class.sabr-topbar-v1]="redesignV1" [class.sabr-topbar-light]="!themeService.isDark">
  <div class="left">
    <button
      *ngIf="mobile"
      nbButton
      size="small"
      status="basic"
      type="button"
      class="menu-toggle"
      aria-label="Abrir menu"
      (click)="menuToggle.emit()"
    >
      <nb-icon icon="menu-outline"></nb-icon>
    </button>

    <div class="title-block" *ngIf="title">
      <span class="title">{{ title }}</span>
    </div>

    <div class="tenant-pill" *ngIf="tenantBadgeText">
      <nb-icon icon="pin-outline"></nb-icon>
      <span>{{ tenantBadgeText }}</span>
    </div>
  </div>

  <div class="right"></div>
</header>

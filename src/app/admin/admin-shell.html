<nb-layout class="phub-layout-host">
  <nb-layout-column>
    <app-phub-shell-layout
      [appTitle]="'PrometheusHUB'"
      [appSubtitle]="'Admin Console'"
      [topbarTitle]="'Admin'"
      [redesignV1]="shellRedesignV1"
      [darkModeEnabled]="darkModeEnabled"
      [tenantBadgeText]="tenantBadgeText"
      [menuItems]="menuItems"
      [userName]="currentUserName"
      [userSubtitle]="currentUserRole"
      [profileName]="currentUserName"
      [profileSubtitle]="currentUserRole"
      (logout)="logout()"
    >
      <router-outlet></router-outlet>
    </app-phub-shell-layout>
  </nb-layout-column>
</nb-layout>

<nb-layout class="sabr-layout-host">
  <nb-layout-column>
    <app-sabr-shell-layout
      [appTitle]="'SABR'"
      [appSubtitle]="'Admin Console'"
      [topbarTitle]="'Admin'"
      [redesignV1]="shellRedesignV1"
      [darkModeEnabled]="darkModeEnabled"
      [tenantBadgeText]="tenantBadgeText"
      [menuItems]="menuItems"
      [userName]="currentUserName"
      [userSubtitle]="currentUserRole"
      [profileName]="currentUserName"
      [profileSubtitle]="currentUserRole"
      (logout)="logout()"
    >
      <router-outlet></router-outlet>
    </app-sabr-shell-layout>
  </nb-layout-column>
</nb-layout>

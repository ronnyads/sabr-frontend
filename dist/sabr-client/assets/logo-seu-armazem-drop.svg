<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 180" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">Logo Seu Armazém Drop</title>
  <desc id="desc">Cubo com seta laranja à esquerda e texto Seu Armazém Drop em preto</desc>
  <style>
    .icon { fill: none; stroke: #fbbd08; stroke-width: 12; stroke-linejoin: round; stroke-linecap: round; }
    .arrow { fill: none; stroke: #fbbd08; stroke-width: 10; stroke-linecap: round; }
    .text { fill: #111; font-family: 'Inter', 'Segoe UI', Arial, sans-serif; font-weight: 700; font-size: 56px; letter-spacing: 0.5px; }
  </style>
  <g transform="translate(12 15)">
    <polygon class="icon" points="70 12 170 52 170 132 70 92 70 12"/>
    <polygon class="icon" points="170 52 270 12 270 92 170 132 170 52"/>
    <line class="icon" x1="70" y1="12" x2="170" y2="52"/>
    <line class="icon" x1="170" y1="52" x2="270" y2="12"/>
    <line class="icon" x1="70" y1="92" x2="170" y2="132"/>
    <line class="icon" x1="170" y1="132" x2="270" y2="92"/>
    <polyline class="arrow" points="202 44 236 58 236 26"/>
  </g>
  <text class="text" x="300" y="110">SEU ARMAZÉM DROP</text>
</svg>

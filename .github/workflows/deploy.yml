name: Deploy Frontend

on:
  push:
    branches:
      - main
      - develop
      - 'hotfix/**'
      - 'release/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build client (prod)
        if: github.ref == 'refs/heads/main'
        run: npm run build:client:prod:deploy

      - name: Build client (dev)
        if: github.ref != 'refs/heads/main'
        run: npm run build:client:dev:deploy

      - name: Build admin (prod)
        if: github.ref == 'refs/heads/main'
        run: npm run build:admin:prod:deploy

      - name: Build admin (dev)
        if: github.ref != 'refs/heads/main'
        run: npm run build:admin:dev:deploy

      - name: Deploy client to Cloudflare Pages (production)
        if: github.ref == 'refs/heads/main'
        run: npx wrangler pages deploy dist/phub-client --project-name=sabr-frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy client to Cloudflare Pages (preview)
        if: github.ref != 'refs/heads/main'
        run: npx wrangler pages deploy dist/phub-client --project-name=sabr-frontend --branch=${{ github.ref_name }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy admin to Cloudflare Pages (production)
        if: github.ref == 'refs/heads/main'
        run: npx wrangler pages deploy dist/phub-admin --project-name=sabr-admin
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy admin to Cloudflare Pages (preview)
        if: github.ref != 'refs/heads/main'
        run: npx wrangler pages deploy dist/phub-admin --project-name=sabr-admin --branch=${{ github.ref_name }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Fly.io (production)
        if: github.ref == 'refs/heads/main'
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Run fly deploy (production)
        if: github.ref == 'refs/heads/main'
        run: flyctl deploy --remote-only --app sabr-frontend-prod
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
